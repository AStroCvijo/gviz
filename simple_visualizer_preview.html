<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gviz Simple Visualizer</title>
  <style>
    :root {
      --bg-app: #0d1117;
      --bg-panel: #161b22;
      --bg-panel-alt: #1c2128;
      --bg-hover: #21262d;
      --border: #30363d;
      --border-bright: #444c56;
      --accent: #58a6ff;
      --accent-dim: rgba(88, 166, 255, 0.15);
      --accent-green: #3fb950;
      --accent-orange: #d29922;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #484f58;
      --node-blue: #58a6ff;
      --node-purple: #bc8cff;
      --node-green: #3fb950;
      --node-orange: #e3b341;
      --node-cyan: #79c0ff;
      --node-selected: #f0883e;
      --edge-color: #444c56;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, rgba(88, 166, 255, 0.12), transparent 28%),
        radial-gradient(circle at bottom right, rgba(188, 140, 255, 0.08), transparent 24%),
        var(--bg-app);
    }

    .page {
      min-height: 100vh;
      padding: 24px 20px;
    }

    .frame {
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(280px, 0.85fr);
      gap: 18px;
      max-width: 1460px;
      margin: 0 auto;
    }

    .panel {
      background: linear-gradient(180deg, rgba(28, 33, 40, 0.98), rgba(22, 27, 34, 0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero,
    .sidebar {
      padding: 22px 24px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 10px 0 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 24px 18px;
    }

    .stat {
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid var(--border-bright);
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }

    .canvas-wrap {
      position: relative;
      padding: 0 18px 18px;
    }

    svg {
      display: block;
      width: 100%;
      height: min(76vh, 820px);
      background:
        linear-gradient(rgba(68, 76, 86, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68, 76, 86, 0.2) 1px, transparent 1px),
        linear-gradient(180deg, #121820 0%, #0d1117 100%);
      background-size: 26px 26px, 26px 26px, auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .canvas-toolbar {
      position: absolute;
      top: 16px;
      right: 34px;
      display: flex;
      gap: 8px;
    }

    .zoom-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border-bright);
      border-radius: 10px;
      background: rgba(22, 27, 34, 0.88);
      color: var(--text-primary);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .zoom-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }

    .sidebar h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .sidebar p {
      margin: 0 0 18px;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    .detail-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--bg-panel-alt);
      padding: 16px;
      min-height: 200px;
    }

    .detail-id {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.3;
    }

    .detail-empty {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    .attrs {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .attr {
      display: grid;
      gap: 4px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .attr-key {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .attr-value {
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
    }

    .edge {
      stroke: var(--edge-color);
      stroke-width: 1.5;
      stroke-opacity: 0.74;
    }

    .node {
      fill-opacity: 0.18;
      stroke-width: 2.5;
      cursor: pointer;
      transition: fill-opacity 120ms ease, stroke-width 120ms ease;
    }

    .node.is-active {
      fill: rgba(240, 136, 62, 0.18);
      fill-opacity: 1;
      stroke: var(--node-selected);
      stroke-width: 3.6;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      fill: var(--text-primary);
      text-anchor: middle;
      pointer-events: none;
    }

    .caption {
      font-size: 11px;
      font-weight: 500;
      line-height: 1;
      fill: var(--text-secondary);
      text-anchor: middle;
      pointer-events: none;
    }

    .legend {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      font-size: 13px;
    }

    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid transparent;
    }

    @media (max-width: 980px) {
      .frame {
        grid-template-columns: 1fr;
      }

      svg {
        height: 60vh;
      }

      .canvas-toolbar {
        right: 28px;
      }
    }
  </style>
</head>

        </div>
      </aside>
    </div>
  </div>

e,"attributes":{"label":"friends"}},{"id":"e936","source":"user-209","target":"user-085","directed":true,"attributes":{"label":"friends"}},{"id":"e937","source":"user-209","target":"user-204","directed":true,"attributes":{"label":"friends"}},{"id":"e938","source":"user-209","target":"user-111","directed":true,"attributes":{"label":"friends"}},{"id":"e939","source":"user-209","target":"user-028","directed":true,"attributes":{"label":"friends"}},{"id":"e940","source":"157d1ae3-d5d1-4914-9124-fce7d47bb0bb","target":"user-209","directed":true,"attributes":{"label":"users"}},{"id":"e941","source":"user-210","target":"user-115","directed":true,"attributes":{"label":"friends"}},{"id":"e942","source":"user-210","target":"user-096","directed":true,"attributes":{"label":"friends"}},{"id":"e943","source":"user-210","target":"user-101","directed":true,"attributes":{"label":"friends"}},{"id":"e944","source":"157d1ae3-d5d1-4914-9124-fce7d47bb0bb","target":"user-210","directed":true,"attributes":{"label":"users"}}]};
    const svg = document.getElementById("graph");
    const details = document.getElementById("details");
    const svgSelection = d3.select(svg);
    const width = 960;
    const height = 720;
    const palette = ["#58a6ff", "#bc8cff", "#3fb950", "#e3b341", "#79c0ff"];
    const nodes = graph.nodes.map((node, index) => ({
      ...node,
      color: palette[index % palette.length],
    }));
    const links = graph.edges.map(edge => ({ ...edge }));
    const root = svgSelection.append("g").attr("class", "viewport");
    const edgesLayer = root.append("g").attr("class", "edges");
    const nodesLayer = root.append("g").attr("class", "nodes");
    let activeNodeId = null;

    function renderDetails(node) {
      const attrs = Object.entries(node.attributes || {});
      const attrsHtml = attrs.length
        ? `<div class="attrs">${attrs.map(([key, value]) => `
            <div class="attr">
              <div class="attr-key">${escapeHtml(key)}</div>
              <div class="attr-value">${escapeHtml(String(value))}</div>
            </div>
          `).join("")}</div>`
        : '<p class="detail-empty">This node has no attributes.</p>';

      details.innerHTML = `
        <p class="detail-id">${escapeHtml(node.label)}</p>
        <p class="detail-empty">Node id: ${escapeHtml(node.id)}</p>
        ${attrsHtml}
      `;
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function applySelection() {
      nodeSelection
        .classed("is-selected", node => node.id === activeNodeId)
        .select("circle")
        .classed("is-active", node => node.id === activeNodeId);
    }

    const zoom = d3.zoom()
      .scaleExtent([0.25, 4])
      .on("zoom", event => {
        root.attr("transform", event.transform);
      });

    svgSelection.call(zoom);

    const linkSelection = edgesLayer
      .selectAll("line")
      .data(links)
      .enter()
      .append("line")
      .attr("class", "edge");

    const nodeSelection = nodesLayer
      .selectAll("g")
      .data(nodes)
      .enter()
      .append("g")
      .style("cursor", "pointer")
      .call(
        d3.drag()
          .on("start", dragStarted)
          .on("drag", dragged)
          .on("end", dragEnded)
      )
      .on("click", (_, node) => {
        activeNodeId = node.id;
        applySelection();
        renderDetails(node);
      });

    nodeSelection
      .append("circle")
      .attr("class", "node")
      .attr("r", 18)
      .attr("fill", node => node.color)
      .attr("stroke", node => node.color);

    nodeSelection
      .append("text")
      .attr("class", "label")
      .attr("y", 4)
      .text(node => (node.label || node.id).slice(0, 14));

    nodeSelection
      .append("text")
      .attr("class", "caption")
      .attr("y", 30)
      .text(node => node.id);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(node => node.id).distance(84).strength(0.45))
      .force("charge", d3.forceManyBody().strength(-260))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide(34));

    function dragStarted(event, node) {
      if (!event.active) {
        simulation.alphaTarget(0.22).restart();
      }
      node.fx = node.x;
      node.fy = node.y;
    }

    function dragged(event, node) {
      node.fx = event.x;
      node.fy = event.y;
    }

    function dragEnded(event, node) {
      if (!event.active) {
        simulation.alphaTarget(0);
      }
      node.fx = null;
      node.fy = null;
    }

    simulation.on("tick", () => {
      linkSelection
        .attr("x1", link => link.source.x)
        .attr("y1", link => link.source.y)
        .attr("x2", link => link.target.x)
        .attr("y2", link => link.target.y);

      nodeSelection.attr("transform", node => `translate(${node.x}, ${node.y})`);
    });

    function fitGraph() {
      const bounds = root.node().getBBox();
      if (!bounds.width || !bounds.height) {
        svgSelection.call(
          zoom.transform,
          d3.zoomIdentity.translate(width / 2, height / 2).scale(1)
        );
        return;
      }

      const scale = Math.max(
        0.25,
        Math.min(2.2, 0.88 / Math.max(bounds.width / width, bounds.height / height))
      );
      const translateX = width / 2 - scale * (bounds.x + bounds.width / 2);
      const translateY = height / 2 - scale * (bounds.y + bounds.height / 2);

      svgSelection
        .transition()
        .duration(350)
        .call(zoom.transform, d3.zoomIdentity.translate(translateX, translateY).scale(scale));
    }

    document.getElementById("zoom-in").addEventListener("click", () => {
      svgSelection.transition().duration(180).call(zoom.scaleBy, 1.25);
    });

    document.getElementById("zoom-out").addEventListener("click", () => {
      svgSelection.transition().duration(180).call(zoom.scaleBy, 0.8);
    });

    document.getElementById("zoom-fit").addEventListener("click", () => {
      fitGraph();
    });

    setTimeout(fitGraph, 260);
  </script>
